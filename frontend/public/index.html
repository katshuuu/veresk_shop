<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#d4a5a5" />
    <meta name="description" content="Veresk - Магазин украшений из эпоксидной смолы. Ручная работа, уникальные дизайны." />
    
    <!-- Пр1. CSS-препроцессоры (SASS) - подключение будет через React, но добавляем базовые мета-теги -->
    <title>Veresk - Украшения из эпоксидной смолы</title>
    
    <!-- Favicon для магазина украшений -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💎</text></svg>">
    
    <!-- Preconnect для шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Подключение Google Fonts для красивого текста -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Дополнительные мета-теги для SEO и социальных сетей -->
    <meta property="og:title" content="Veresk - Украшения из эпоксидной смолы" />
    <meta property="og:description" content="Ручная работа. Уникальные украшения с цветами и природными материалами." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://via.placeholder.com/1200x630/d4a5a5/ffffff?text=Veresk+Jewelry" />
    
    <!-- Базовые стили для body до загрузки React-приложения -->
    <style>
        /* Пр1. CSS-препроцессоры (SASS) - эти стили будут дополнены основными SCSS стилями,
           но добавляем базовые для предотвращения скачка контента при загрузке */
        @font-face {
                font-family: 'Avenir Next';
                src: url('./fonts/Avenir Next.ttc') format('truetype');
                font-weight: normal;
                font-style: normal;
            }
           body {
            margin: 0;
            padding: 0;
            font-family: 'Avenir Next', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333333;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Стили для экрана загрузки */
        #root {
            min-height: 100vh;
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f9f9f9 0%, #f0e6e6 100%);
            font-family: 'Playfair Display', serif;
        }
        
        .loading-screen h1 {
            color: #d4a5a5;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .loading-screen p {
            color: #b8b5b5;
            font-size: 1.2rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Стили для ошибки загрузки */
        .error-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fff5f5 0%, #ffe0e0 100%);
            text-align: center;
            padding: 20px;
        }
        
        .error-screen h1 {
            color: #ff6b6b;
            font-size: 3rem;
            margin-bottom: 20px;
        }
        
        .error-screen p {
            color: #666;
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
        }
        
        .error-screen button {
            background-color: #d4a5a5;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            border: 2px solid transparent;
        }
        
        .error-screen button:hover {
            background-color: #c08c8c;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 165, 165, 0.3);
        }
        
        /* Декоративные элементы для бренда */
        .brand-decoration {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #d4a5a5, #a7c7b3);
            border-radius: 50%;
            opacity: 0.2;
            pointer-events: none;
            z-index: 9999;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .loading-screen h1 {
                font-size: 2rem;
                padding: 0 20px;
                text-align: center;
            }
            
            .error-screen h1 {
                font-size: 2rem;
            }
            
            .error-screen p {
                font-size: 1rem;
                padding: 0 20px;
            }
        }
    </style>
</head>
<body>
    <!-- Декоративный элемент бренда -->
    <div class="brand-decoration" aria-hidden="true"></div>
    
    <!-- Корневой элемент React-приложения -->
    <div id="root">
        <!-- Контент для отображения во время загрузки React-приложения -->
        <div class="loading-screen" id="loading-screen">
            <h1>💎 Veresk</h1>
            <p>Загружаем украшения ручной работы...</p>
            <!-- Добавляем анимированные точки -->
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <div style="width: 12px; height: 12px; background: #d4a5a5; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite;"></div>
                <div style="width: 12px; height: 12px; background: #a7c7b3; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite 0.3s;"></div>
                <div style="width: 12px; height: 12px; background: #b8b5b5; border-radius: 50%; animation: pulse 1.5s ease-in-out infinite 0.6s;"></div>
            </div>
        </div>
    </div>
    
    <!-- Скрипт для обработки ошибок загрузки React -->
    <script>
        // Функция для отображения ошибки, если React не загрузился
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const root = document.getElementById('root');
            if (root && !root.hasChildNodes()) {
                root.innerHTML = `
                    <div class="error-screen">
                        <h1>Упс...</h1>
                        <p>Что-то пошло не так при загрузке приложения. Пожалуйста, попробуйте обновить страницу.</p>
                        <button onclick="location.reload()">Обновить страницу</button>
                        <p style="margin-top: 40px; font-size: 0.9rem; color: #999;">
                            Если ошибка повторяется, свяжитесь с нами: support@veresk.ru
                        </p>
                    </div>
                `;
            }
            return false;
        };
        
        // Убираем экран загрузки после полной загрузки React
        window.addEventListener('load', function() {
            // Даем React время на монтирование
            setTimeout(function() {
                const loadingScreen = document.getElementById('loading-screen');
                if (loadingScreen && document.getElementById('root').children.length > 1) {
                    loadingScreen.style.display = 'none';
                }
            }, 1000);
        });
        
        // Добавляем поддержку PWA (если потребуется в будущем)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js').catch(error => {
                    console.log('ServiceWorker registration failed:', error);
                });
            });
        }
    </script>
    
    <!-- Нумерация страницы для SEO -->
    <div style="display: none;" aria-hidden="true">
        <!-- Скрытый контент для поисковых роботов -->
        <h1>Veresk - Магазин украшений из эпоксидной смолы</h1>
        <p>Ручная работа, уникальные украшения с цветами, эпоксидная смола, серьги, кулоны, браслеты, кольца.</p>
        <p>Контакты: info@veresk.ru, +7 (999) 123-45-67</p>
    </div>
    
    <!-- Поддержка старых браузеров -->
    <script>
        // Проверка поддержки современных функций
        try {
            eval("async function test() {}");
        } catch (e) {
            alert('Ваш браузер устарел. Пожалуйста, обновите его для корректной работы сайта.');
        }
    </script>
</body>
</html>
